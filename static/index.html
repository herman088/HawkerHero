<!doctype html>
<html>
  <head>
    <title>Hawker Search</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="headerSearch">
      <h1>🍜 Find the best dish</h1>
      <div>
        <input id="search" placeholder="e.g. chicken rice" />
        <button onclick="search()">Search</button>
      </div>
    </div>

    <div id="results"></div>

    <script src="/static/app.js"></script>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button id="modal-close">&times</button>

        <img class="modal-image" id="modal-image" />

        <div id="modal-head">
          <h3 id="modal-title"></h3>
          <p id="modal-rating"></p>
        </div>

        <div id="modal-meta">
          <p id="mentions"></p>
          <p id="reco-count"></p>
          <p id="positive-count"></p>
        </div>
      </div>
    </div>
  </body>
</html>
