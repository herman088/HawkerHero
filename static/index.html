<!doctype html>
<html>
  <head>
    <title>Hawker Search</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="headerSearch">
      <img
        src="/static/hawker-hero.svg"
        alt="Hawker Hero"
        width="240"
        height="100"
      />
      <div id="searchBtnInput">
        <input id="search" placeholder="e.g. chicken rice" />
        <button id="searchBtn" onclick="search()">Search</button>
      </div>
    </div>

    <div id="results"></div>

    <script src="/static/app.js"></script>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <span id="modal-close">&times</span>
        <div id="card-row-top">
          <img class="modal-image" id="modal-image" />

          <div id="modal-meta">
            <h3 id="modal-title"></h3>
            <p id="modal-rating"></p>
            <p id="mentions"></p>
            <p id="reco-count"></p>
            <p id="positive-count"></p>
          </div>
        </div>

        <div id="card-row-btm">
          <p id="desc"></p>
        </div>
      </div>
    </div>

    <div id="pagination-controls" class="hidden">
      <button id="prev-btn">«</button>
      <span id="page-info"></span>
      <button id="next-btn">»</button>
    </div>
  </body>
</html>
